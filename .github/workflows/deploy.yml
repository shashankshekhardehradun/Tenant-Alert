# Build Docker images and roll Cloud Run API / Web / Worker on pushes to main.
# Requires GCP Workload Identity Federation + GitHub secrets (see docs/deployment.md §10).

name: deploy

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "web/**"
      - "ingestion/**"
      - "src/**"
      - "scripts/**"
      - "dbt/**"
      - "requirements/**"
      - "Dockerfile.api"
      - "Dockerfile.worker"
      - "pyproject.toml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      ENVIRONMENT: ${{ vars.TF_ENVIRONMENT }}

    steps:
      - name: Check required configuration
        env:
          WIF_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          DEPLOY_SA: ${{ secrets.GCP_DEPLOY_SA_EMAIL }}
          MAPS_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
          PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
        run: |
          set -euo pipefail
          missing=""
          [ -z "${GCP_PROJECT_ID:-}" ] && missing="$missing GCP_PROJECT_ID(repo variable)"
          [ -z "${GCP_REGION:-}" ] && missing="$missing GCP_REGION(repo variable)"
          [ -z "${ENVIRONMENT:-}" ] && missing="$missing TF_ENVIRONMENT(repo variable)"
          if [ -n "$missing" ]; then
            echo "::error::Missing GitHub repository variables:$missing"
            echo "Set them under Settings → Secrets and variables → Actions → Variables"
            exit 1
          fi
          if [ -z "${WIF_PROVIDER:-}" ] || [ -z "${DEPLOY_SA:-}" ]; then
            echo "::error::Missing secrets GCP_WORKLOAD_IDENTITY_PROVIDER or GCP_DEPLOY_SA_EMAIL"
            echo "See docs/deployment.md §10 for Workload Identity Federation setup."
            exit 1
          fi
          if [ -z "${MAPS_KEY:-}" ] || [ -z "${PUBLIC_API_URL:-}" ]; then
            echo "::error::Web build needs vars.NEXT_PUBLIC_API_URL and secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY"
            exit 1
          fi

      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Image names
        run: |
          echo "REGISTRY=${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/tenant-alert" >> "$GITHUB_ENV"
          echo "TAG=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "API_SERVICE=tenant-alert-api-${ENVIRONMENT}" >> "$GITHUB_ENV"
          echo "WEB_SERVICE=tenant-alert-web-${ENVIRONMENT}" >> "$GITHUB_ENV"
          echo "WORKER_JOB=tenant-alert-daily-refresh-${ENVIRONMENT}" >> "$GITHUB_ENV"

      - name: Build and push API
        run: |
          set -euo pipefail
          img="${REGISTRY}/api:${TAG}"
          docker build -f Dockerfile.api -t "${img}" -t "${REGISTRY}/api:latest" .
          docker push "${img}"
          docker push "${REGISTRY}/api:latest"

      - name: Build and push worker
        run: |
          set -euo pipefail
          img="${REGISTRY}/worker:${TAG}"
          docker build -f Dockerfile.worker -t "${img}" -t "${REGISTRY}/worker:latest" .
          docker push "${img}"
          docker push "${REGISTRY}/worker:latest"

      - name: Build and push web
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
          NEXT_PUBLIC_GOOGLE_MAP_ID: ${{ vars.NEXT_PUBLIC_GOOGLE_MAP_ID }}
          NEXT_PUBLIC_USE_GOOGLE_MAP_ID: ${{ vars.NEXT_PUBLIC_USE_GOOGLE_MAP_ID }}
        run: |
          set -euo pipefail
          img="${REGISTRY}/web:${TAG}"
          extra_map_id="${NEXT_PUBLIC_GOOGLE_MAP_ID:-}"
          extra_use_map="${NEXT_PUBLIC_USE_GOOGLE_MAP_ID:-false}"
          docker build -f web/Dockerfile \
            --build-arg "NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}" \
            --build-arg "NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}" \
            --build-arg "NEXT_PUBLIC_GOOGLE_MAP_ID=${extra_map_id}" \
            --build-arg "NEXT_PUBLIC_USE_GOOGLE_MAP_ID=${extra_use_map}" \
            -t "${img}" -t "${REGISTRY}/web:latest" \
            ./web
          docker push "${img}"
          docker push "${REGISTRY}/web:latest"

      - name: Deploy API to Cloud Run
        run: |
          set -euo pipefail
          gcloud run services update "${API_SERVICE}" \
            --project="${GCP_PROJECT_ID}" \
            --region="${GCP_REGION}" \
            --image="${REGISTRY}/api:${TAG}" \
            --quiet

      - name: Deploy web to Cloud Run
        run: |
          set -euo pipefail
          gcloud run services update "${WEB_SERVICE}" \
            --project="${GCP_PROJECT_ID}" \
            --region="${GCP_REGION}" \
            --image="${REGISTRY}/web:${TAG}" \
            --quiet

      - name: Update worker job image
        run: |
          set -euo pipefail
          gcloud run jobs update "${WORKER_JOB}" \
            --project="${GCP_PROJECT_ID}" \
            --region="${GCP_REGION}" \
            --image="${REGISTRY}/worker:${TAG}" \
            --quiet
