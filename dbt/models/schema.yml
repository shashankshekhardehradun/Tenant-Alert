version: 2

models:
  - name: silver_complaints
    columns:
      - name: unique_key
        tests: [not_null, unique]
  - name: gold_fct_complaints
    columns:
      - name: complaint_created_date
        tests: [not_null]
  - name: silver_311_street_signals
    columns:
      - name: unique_key
        tests: [not_null, unique]
      - name: signal_date
        tests: [not_null]
      - name: signal_category
        tests: [not_null]
  - name: silver_mta_service_alerts
    columns:
      - name: alert_id
        tests: [not_null]
      - name: snapshot_date
        tests: [not_null]
      - name: borough_hint
        tests: [not_null]
  - name: gold_avoidability_area_latest
    columns:
      - name: borough
        tests: [not_null, unique]
      - name: avoidability_score
        tests: [not_null]
  - name: silver_crime_events
    columns:
      - name: complaint_id
        tests: [not_null, unique]
      - name: complaint_date
        tests: [not_null]
  - name: gold_fct_crime_events
    columns:
      - name: complaint_id
        tests: [not_null, unique]
      - name: complaint_date
        tests: [not_null]
  - name: silver_census_acs_tract
    columns:
      - name: tract_geoid
        tests: [not_null, unique]
  - name: silver_tract_nta_equivalency
    columns:
      - name: tract_geoid
        tests: [not_null, unique]
      - name: nta_code
        tests: [not_null]
  - name: gold_agg_demographics_by_nta
    columns:
      - name: nta_code
        tests: [not_null, unique]
  - name: features_crime_risk_hourly
    columns:
      - name: feature_date
        tests: [not_null]
      - name: borough
        tests: [not_null]
      - name: hour
        tests: [not_null]
      - name: crime_pressure_score
        tests: [not_null]
  - name: predictions_crime_risk_latest
    columns:
      - name: predicted_crime_pressure_score
        tests: [not_null]
